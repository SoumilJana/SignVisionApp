<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SignVision Clone Unified View</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style type="text/tailwindcss">
        :root {
            --primary-blue: #2563EB;
            --primary-light: #EFF6FF;
            --secondary-blue: #1D4ED8;
            --text-dark: #111827;
            --text-gray: #6B7280;
            --bg-page: #F9FAFB;
            --accent-purple: #7C3AED;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-page);
        }
        .ios-notch {
            height: 44px;
            width: 100%;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-50 h-screen w-screen overflow-hidden flex flex-col items-center justify-center">
<div class="w-full h-full max-w-md bg-white shadow-2xl relative overflow-hidden flex flex-col">
<div class="ios-notch bg-white flex justify-between items-end px-6 pb-2 text-black text-xs font-medium z-20">
<span>9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[16px] font-bold">signal_cellular_alt</span>
<span class="material-symbols-outlined text-[16px] font-bold">wifi</span>
<span class="material-symbols-outlined text-[16px] font-bold">battery_full</span>
</div>
</div>
<main class="flex-1 overflow-y-auto hide-scrollbar bg-gray-50 pb-20">
<section class="bg-white px-6 pt-6 pb-8 rounded-b-[2rem] shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] mb-6">
<div class="flex justify-between items-start mb-8">
<div>
<p class="text-sm text-gray-500 font-medium mb-1">Welcome back,</p>
<h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">Alex Student</h1>
</div>
<button class="w-10 h-10 rounded-full bg-gray-50 flex items-center justify-center text-gray-600 hover:bg-gray-100 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
</div>
<div class="relative overflow-hidden rounded-2xl bg-gradient-to-br from-blue-600 to-indigo-700 text-white shadow-xl shadow-blue-500/20">
<div class="absolute -top-10 -right-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
<div class="absolute bottom-0 left-0 w-32 h-32 bg-blue-400/20 rounded-full blur-xl"></div>
<div class="relative z-10 p-6 flex flex-col items-start">
<div class="w-12 h-12 rounded-xl bg-white/20 backdrop-blur-sm flex items-center justify-center mb-4 text-white">
<span class="material-symbols-outlined text-2xl">face</span>
</div>
<h2 class="text-2xl font-bold mb-2">Digital Twin</h2>
<p class="text-blue-100 text-sm mb-6 max-w-[240px] leading-relaxed">Bring your image to life with AI-generated speech.</p>
<button class="w-full bg-white text-blue-700 font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 hover:bg-blue-50 transition-colors shadow-sm">
<span class="material-symbols-outlined">auto_fix_high</span>
                            Start Cloning
                        </button>
</div>
</div>
</section>
<section class="px-6 mb-6">
<div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100 flex flex-col gap-4">
<h3 class="font-bold text-gray-900 mb-1">Create New Clone</h3>
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-gray-50 border border-gray-100 hover:bg-blue-50 hover:border-blue-100 transition-all group">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-blue-600 shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">cloud_upload</span>
</div>
<span class="text-xs font-semibold text-gray-600 group-hover:text-blue-700 text-center">Upload Photo</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 p-4 rounded-xl bg-gray-50 border border-gray-100 hover:bg-blue-50 hover:border-blue-100 transition-all group">
<div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-blue-600 shadow-sm group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined">photo_camera</span>
</div>
<span class="text-xs font-semibold text-gray-600 group-hover:text-blue-700 text-center">Take Photo</span>
</button>
</div>
<div class="relative mt-2">
<label class="sr-only" for="script">Enter Speech Script</label>
<div class="absolute top-3 left-3 text-gray-400">
<span class="material-symbols-outlined text-[20px]">description</span>
</div>
<textarea class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none resize-none text-gray-700 placeholder-gray-400" id="script" placeholder="Enter speech script here..." rows="3"></textarea>
</div>
</div>
</section>
<section class="px-6 pb-6">
<h3 class="text-lg font-bold text-gray-900 mb-3">Recent Generation</h3>
<div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
<div class="relative w-full aspect-video bg-gray-900 rounded-xl overflow-hidden mb-4 group">
<div class="absolute inset-0 flex items-center justify-center bg-black/20 group-hover:bg-black/40 transition-colors">
<div class="w-12 h-12 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center text-white cursor-pointer hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">play_arrow</span>
</div>
</div>
<div class="absolute top-3 right-3 bg-green-500/90 backdrop-blur-sm text-white text-[10px] font-bold px-2.5 py-1 rounded-full flex items-center gap-1 shadow-sm">
<span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                            READY
                        </div>
<div class="w-full h-full bg-gradient-to-tr from-gray-700 to-gray-600 mix-blend-overlay"></div>
</div>
<div class="flex gap-3">
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-gray-200 text-gray-700 text-sm font-semibold hover:bg-gray-50 transition-colors">
<span class="material-symbols-outlined text-[18px]">download</span>
                            Download
                        </button>
<button class="flex-1 flex items-center justify-center gap-2 py-2.5 px-4 rounded-xl border border-gray-200 text-gray-700 text-sm font-semibold hover:bg-gray-50 transition-colors">
<span class="material-symbols-outlined text-[18px]">share</span>
                            Share
                        </button>
</div>
</div>
</section>
</main>
<nav class="bg-white border-t border-gray-100 px-6 py-2 pb-6 flex justify-between items-end relative z-30 h-[88px]">
<button class="flex flex-col items-center justify-center w-12 h-12 text-gray-400 hover:text-gray-600 transition-colors mb-2">
<span class="material-symbols-outlined text-[28px]">home</span>
</button>
<button class="flex flex-col items-center justify-center w-12 h-12 text-gray-400 hover:text-gray-600 transition-colors mb-2">
<span class="material-symbols-outlined text-[28px]">school</span>
</button>
<div class="relative -top-6">
<button class="w-16 h-16 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-lg shadow-blue-600/30 border-4 border-white transform hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-[32px]">photo_camera</span>
</button>
</div>
<button class="flex flex-col items-center justify-end gap-1 w-12 h-12 text-blue-600">
<span class="material-symbols-outlined text-[28px] fill-1">content_copy</span>
<span class="text-[10px] font-bold">Clone</span>
</button>
<button class="flex flex-col items-center justify-center w-12 h-12 text-gray-400 hover:text-gray-600 transition-colors mb-2">
<span class="material-symbols-outlined text-[28px]">person</span>
</button>
</nav>
</div>

</body></html>
